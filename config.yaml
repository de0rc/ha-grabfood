name: "GrabFood Tracker"
description: "Tracks GrabFood delivery orders in Home Assistant."
version: "0.2.1"
slug: "grabfood_tracker"
url: "https://github.com/de0rc/ha-grabfood"
init: false
arch:
  - aarch64
  - amd64
ingress: true
ingress_port: 8099
panel_icon: mdi:moped
panel_title: GrabFood Tracker
map:
  - config:rw
hassio_api: true
hassio_role: default
auth_api: true
homeassistant_api: true
options:
  log_level: "info"
schema:
  log_level: "list(debug|info|warning|error)"