configuration:
  show_driver_map:
    name: Driver Map
    description: Enable to track your delivery driver's location on the Home Assistant map. Creates a device_tracker.grabfood_driver entity.
  log_level:
    name: Log Level
    description: Controls the verbosity of add-on logs. Use 'info' for normal use. Switch to 'debug' when troubleshooting to see detailed API responses, sensor push confirmations, and cookie capture information.